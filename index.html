<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La multi ani Ilinca!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #fce029; /* Galben Minion */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1200px;
        }

        #bg-layer {
            position: absolute;
            top: -20%; left: -20%; right: -20%; bottom: -20%;
            background: radial-gradient(circle at center, #fce029 0%, #f0c400 100%);
            z-index: -2;
            transition: transform 0.1s ease-out;
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Cardul inițial - Ascuns la început */
        .card {
            position: relative;
            z-index: 10;
            padding: 20px;
            background: #ffffff;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease-out, opacity 0.5s ease-in-out;
            transform-style: preserve-3d;
            display: none; /* Ascuns inițial */
            opacity: 0;
        }

        .greeting {
            color: #000080; /* Navy Blue */
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
            transform: translateZ(60px);
        }

        .card img {
            display: block;
            border-radius: 15px;
            width: 300px;
            height: 300px;
            max-width: 75vw;
            max-height: 75vw;
            object-fit: cover;
            border: 5px solid #fce029;
            transform: translateZ(40px); 
        }

        /* Conținutul după Shake - Ascuns */
        #shake-content {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 20;
            width: 90%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .shake-text {
            color: #000080;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.4;
            padding: 0 10px;
        }

        .noi-img {
            width: 320px;
            max-width: 85vw;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 8px solid white;
        }

        /* Butonul Central de Start */
        #permission-btn {
            padding: 20px 50px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 900;
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        #permission-btn:active {
            transform: scale(0.9);
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <canvas id="confetti-canvas"></canvas>

    <button id="permission-btn">Apasa-ma!!!</button>

    <div class="card" id="tilt-card">
        <h1 class="greeting">La multi ani Ilinca!!</h1>
        <img src="tenor.gif" alt="Minion Birthday">
    </div>

    <div id="shake-content">
        <p class="shake-text">La multi ani iubirea mea!! <br> Te iubesc cel mai mult din tot universul ilinca!</p>
        <img src="noi.jpg" class="noi-img" alt="Noi">
    </div>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const myConfetti = confetti.create(canvas, { resize: true });
        const card = document.getElementById('tilt-card');
        const bg = document.getElementById('bg-layer');
        const btn = document.getElementById('permission-btn');
        const shakeContent = document.getElementById('shake-content');
        
        let confettiInterval;
        let isShaken = false;
        let baseBeta = null;
        let baseGamma = null;

        // --- 1. CONFETTI ---
        function startConfetti() {
            myConfetti({ 
                particleCount: 200, 
                spread: 100, 
                origin: { y: 0.6 }, 
                colors: ['#ffffff', '#000080', '#fce029'] 
            });
            confettiInterval = setInterval(() => {
                myConfetti({ particleCount: 5, angle: 60, spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
                myConfetti({ particleCount: 5, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
            }, 200);
        }

        function stopConfetti() {
            clearInterval(confettiInterval);
        }

        // --- 2. GIROSCOP ---
        function handleOrientation(event) {
            if (isShaken) return;
            
            let beta = event.beta; 
            let gamma = event.gamma;
            if (beta === null || gamma === null) return;

            if (baseBeta === null) { 
                baseBeta = beta; 
                baseGamma = gamma; 
            }

            let tiltY = Math.max(-35, Math.min(35, beta - baseBeta));
            let tiltX = Math.max(-35, Math.min(35, gamma - baseGamma));

            card.style.transform = `rotateX(${-(tiltY / 35) * 25}deg) rotateY(${(tiltX / 35) * 25}deg)`;
            bg.style.transform = `translate(${(tiltX / 35) * -45}px, ${(tiltY / 35) * -45}px)`;
        }

        // --- 3. DETECTARE SHAKE ---
        let lastX, lastY, lastZ;
        let moveThreshold = 25; 

        function handleMotion(event) {
            if (isShaken) return;
            let accel = event.accelerationIncludingGravity;
            if (!accel || accel.x === null) return;

            let deltaX = Math.abs(accel.x - lastX);
            let deltaY = Math.abs(accel.y - lastY);
            let deltaZ = Math.abs(accel.z - lastZ);

            if ((deltaX > moveThreshold && deltaY > moveThreshold) || (deltaX > moveThreshold && deltaZ > moveThreshold)) {
                triggerSurprise();
            }

            lastX = accel.x; lastY = accel.y; lastZ = accel.z;
        }

        function triggerSurprise() {
            isShaken = true;
            stopConfetti();
            
            card.classList.add('fade-out');
            
            setTimeout(() => {
                card.style.display = 'none';
                shakeContent.style.display = 'flex';
                bg.style.transform = `translate(0,0)`;
            }, 500);
        }

        // --- 4. ACTIVARE (BUTON) ---
        btn.addEventListener('click', async () => {
            // Cerere permisiuni iOS
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const orientationState = await DeviceOrientationEvent.requestPermission();
                    if (orientationState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    
                    const motionState = await DeviceMotionEvent.requestPermission();
                    if (motionState === 'granted') window.addEventListener('devicemotion', handleMotion);
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
            }

            // Ascundem butonul și afișăm conținutul
            btn.style.display = 'none';
            card.style.display = 'block';
            setTimeout(() => { card.style.opacity = '1'; }, 50);
            
            startConfetti();
        });
    </script>
</body>
</html>

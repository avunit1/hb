<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La multi ani Ilinca!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #fce029;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1200px;
        }

        #bg-layer {
            position: absolute;
            top: -20%; left: -20%; right: -20%; bottom: -20%;
            background: radial-gradient(circle at center, #fce029 0%, #f0c400 100%);
            z-index: -3;
            will-change: transform;
        }

        #balloon-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            display: none;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            opacity: 1;
            animation: floatUp infinite linear;
        }

        .balloon::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%;
            width: 2px; height: 80px;
            background: #000;
        }

        .b-blue   { background: #004dff; border: 2px solid #0033aa; }
        .b-red    { background: #ff0000; border: 2px solid #aa0000; }
        .b-pink   { background: #ff69b4; border: 2px solid #cc5599; }
        .b-white  { background: #ffffff; border: 2px solid #cccccc; }
        .b-purple { background: #a020f0; border: 2px solid #7010b0; }

        @keyframes floatUp {
            0%   { transform: translateY(0)       rotate(0deg); }
            100% { transform: translateY(-130vh)  rotate(10deg); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            padding: 20px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.4);
            /* transition removed from transform — RAF handles smoothing now */
            transition: opacity 0.5s ease-in-out;
            transform-style: preserve-3d;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            width: fit-content;
            will-change: transform;
        }

        .greeting {
            color: #000080;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;

            transform: translateZ(60px);
        }

        .card img {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            width: 300px;
            height: 300px;
            max-width: 75vw;
            max-height: 75vw;
            object-fit: cover;
            border: 5px solid #fce029;
            transform: translateZ(40px);
        }

        #shake-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 20;
            width: 90%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        .shake-text {
            color: #000080;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.4;
            padding: 0 10px;
        }

        .noi-img {
            width: 320px;
            max-width: 85vw;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 8px solid white;
        }

        #permission-btn {
            padding: 20px 50px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 900;
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .fade-out { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="balloon-container"></div>
    <canvas id="confetti-canvas"></canvas>

    <button id="permission-btn">Apasa-ma!!!</button>

    <div class="card" id="tilt-card">
        <h1 class="greeting">La multi ani Ilinca!!</h1>
        <img src="tenor.gif" alt="Minion Birthday">
    </div>

    <div id="shake-content">
        <p class="shake-text">La multi ani iubirea mea!! <br> Te iubesc cel mai mult din tot universul ilinca!</p>
        <img src="noi.jpg" class="noi-img" alt="Noi">
    </div>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const myConfetti = confetti.create(canvas, { resize: true });
        const card = document.getElementById('tilt-card');
        const bg = document.getElementById('bg-layer');
        const btn = document.getElementById('permission-btn');
        const shakeContent = document.getElementById('shake-content');
        const balloonContainer = document.getElementById('balloon-container');

        let confettiInterval, balloonInterval, rafId;
        let isShaken = false;

        // Calibration — set when card becomes visible, not on first sensor event
        let baseBeta = null, baseGamma = null;

        // Smoothed values (lerp targets and current state)
        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;

        // Motion shake detection
        let lastX = 0, lastY = 0;

        const LERP = 0.12;          // Lower = smoother but slower (0.08–0.15 is good)
        const MAX_TILT_DEG = 30;    // Device tilt range mapped to card
        const MAX_CARD_ROT = 20;    // Max card rotation in degrees
        const MAX_BG_SHIFT = 45;    // Max bg parallax in px

        const colors = ['b-blue', 'b-red', 'b-pink', 'b-white', 'b-purple'];

        /* ── Balloon ─────────────────────────────────────── */
        function createBalloon() {
            const b = document.createElement('div');
            b.className = `balloon ${colors[Math.floor(Math.random() * colors.length)]}`;
            b.style.left = `${Math.random() * 90 + 5}%`;
            b.style.animationDuration = `${Math.random() * 4 + 4}s`;
            balloonContainer.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }

        /* ── Confetti ────────────────────────────────────── */
        function startConfetti() {
            myConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ffffff', '#000080', '#fce029'] });
            confettiInterval = setInterval(() => {
                myConfetti({ particleCount: 5, angle: 60,  spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
                myConfetti({ particleCount: 5, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
            }, 200);
        }

        /* ── RAF tilt loop ───────────────────────────────── */
        function tiltLoop() {
            if (!isShaken) {
                // Lerp toward target
                currentRotX += (targetRotX - currentRotX) * LERP;
                currentRotY += (targetRotY - currentRotY) * LERP;

                card.style.transform =
                    `scale(0.8) rotateX(${currentRotX.toFixed(3)}deg) rotateY(${currentRotY.toFixed(3)}deg)`;
                bg.style.transform =
                    `translate(${(-currentRotY / MAX_CARD_ROT * MAX_BG_SHIFT).toFixed(3)}px,` +
                    ` ${( currentRotX / MAX_CARD_ROT * MAX_BG_SHIFT).toFixed(3)}px)`;
            }
            rafId = requestAnimationFrame(tiltLoop);
        }

        /* ── Orientation handler ─────────────────────────── */
        function handleOrientation(event) {
            if (isShaken) return;
            const { beta, gamma } = event;
            if (beta === null || gamma === null) return;

            // Calibration is set once when the card appears (see btn click handler)
            if (baseBeta === null || baseGamma === null) return;

            // Delta from resting position, clamped
            const dBeta  = Math.max(-MAX_TILT_DEG, Math.min(MAX_TILT_DEG, beta  - baseBeta));
            const dGamma = Math.max(-MAX_TILT_DEG, Math.min(MAX_TILT_DEG, gamma - baseGamma));

            // Map to card rotation angles
            targetRotX = -(dBeta  / MAX_TILT_DEG) * MAX_CARD_ROT;
            targetRotY =  (dGamma / MAX_TILT_DEG) * MAX_CARD_ROT;
        }

        /* ── Motion/shake handler ────────────────────────── */
        function handleMotion(event) {
            if (isShaken) return;
            const accel = event.accelerationIncludingGravity;
            if (!accel || accel.x === null) return;
            const deltaX = Math.abs(accel.x - lastX);
            const deltaY = Math.abs(accel.y - lastY);
            if (deltaX > 25 || deltaY > 25) triggerSurprise();
            lastX = accel.x;
            lastY = accel.y;
        }

        /* ── Surprise reveal ─────────────────────────────── */
        function triggerSurprise() {
            if (isShaken) return;
            isShaken = true;
            cancelAnimationFrame(rafId);
            clearInterval(confettiInterval);
            clearInterval(balloonInterval);
            card.classList.add('fade-out');
            setTimeout(() => {
                card.style.display = 'none';
                balloonContainer.style.display = 'none';
                bg.style.transform = 'translate(0,0)';
                shakeContent.style.display = 'flex';
            }, 500);
        }

        /* ── Button ──────────────────────────────────────── */
        btn.addEventListener('click', async () => {
            // Register sensor listeners
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const oState = await DeviceOrientationEvent.requestPermission();
                    if (oState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    const mState = await DeviceMotionEvent.requestPermission();
                    if (mState === 'granted') window.addEventListener('devicemotion', handleMotion);
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
            }

            btn.style.display = 'none';
            card.style.display = 'flex';
            balloonContainer.style.display = 'block';

            // Calibrate AFTER a short delay so the first sensor reading is stable,
            // and the phone is already in the user's hand at reading angle.
            setTimeout(() => {
                const calibrate = (e) => {
                    if (e.beta !== null && e.gamma !== null) {
                        baseBeta  = e.beta;
                        baseGamma = e.gamma;
                    }
                    window.removeEventListener('deviceorientation', calibrate);
                };
                window.addEventListener('deviceorientation', calibrate);
            }, 300);

            setTimeout(() => { card.style.opacity = '1'; }, 50);

            startConfetti();
            balloonInterval = setInterval(createBalloon, 600);
            tiltLoop(); // Start smooth RAF loop
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La multi ani Ilinca!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://code.createjs.com/easeljs-0.8.2.min.js"></script>
    <script src="https://code.createjs.com/tweenjs-0.6.2.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #fce029;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1200px;
        }

        #bg-layer {
            position: absolute;
            top: -20%; left: -20%; right: -20%; bottom: -20%;
            background: radial-gradient(circle at center, #fce029 0%, #f0c400 100%);
            z-index: -3;
            will-change: transform;
        }

        #balloon-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            display: none;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            opacity: 1;
            animation: floatUp infinite linear;
        }

        .balloon::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%;
            width: 2px; height: 80px;
            background: #000;
        }

        .b-blue   { background: #004dff; border: 2px solid #0033aa; }
        .b-red    { background: #ff0000; border: 2px solid #aa0000; }
        .b-pink   { background: #ff69b4; border: 2px solid #cc5599; }
        .b-white  { background: #ffffff; border: 2px solid #cccccc; }
        .b-purple { background: #a020f0; border: 2px solid #7010b0; }

        @keyframes floatUp {
            0%   { transform: translateY(0)       rotate(0deg); }
            100% { transform: translateY(-130vh)  rotate(10deg); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            padding: 20px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.4);
            /* transition removed from transform — RAF handles smoothing now */
            transition: opacity 0.5s ease-in-out;
            transform-style: preserve-3d;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            width: fit-content;
            will-change: transform;
        }

        .greeting {
            color: #000080;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;

            transform: translateZ(60px);
        }

        .card img {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            width: 300px;
            height: 300px;
            max-width: 75vw;
            max-height: 75vw;
            object-fit: cover;
            border: 5px solid #fce029;
            transform: translateZ(40px);
        }

        #shake-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 20;
            width: 90%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        .shake-text {
            color: #000080;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.4;
            padding: 0 10px;
        }

        .noi-img {
            width: 320px;
            max-width: 85vw;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 8px solid white;
        }

        #permission-btn {
            padding: 20px 50px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 900;
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .fade-out { opacity: 0 !important; pointer-events: none; }

        /* ── Cherry Blossom Page ─────────────────────────── */
        #cherry-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            background: #AEDDCD;
        }
        #cherry-page.visible { opacity: 1; }

        #treeCanvas {
            position: absolute;
            width: 83.33%;
            height: 71.4%;
            z-index: 1;
            right: 0;
        }
        #leavesCanvas {
            position: absolute;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="balloon-container"></div>
    <canvas id="confetti-canvas"></canvas>

    <button id="permission-btn">Apasa-ma!!!</button>

    <div class="card" id="tilt-card">
        <h1 class="greeting">La multi ani Ilinca!!</h1>
        <img src="tenor.gif" alt="Minion Birthday">
    </div>

    <div id="cherry-page">
        <canvas id="treeCanvas"></canvas>
        <canvas id="leavesCanvas"></canvas>
    </div>

    <div id="shake-content">
        <p class="shake-text">La multi ani iubirea mea!! <br> Te iubesc cel mai mult din tot universul ilinca!</p>
        <img src="noi.jpg" class="noi-img" alt="Noi">
    </div>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const myConfetti = confetti.create(canvas, { resize: true });
        const card = document.getElementById('tilt-card');
        const bg = document.getElementById('bg-layer');
        const btn = document.getElementById('permission-btn');
        const shakeContent = document.getElementById('shake-content');
        const balloonContainer = document.getElementById('balloon-container');
        const cherryPage = document.getElementById('cherry-page');

        let confettiInterval, balloonInterval, rafId;
        let isShaken = false;   // first shake (card → photo)
        let isShaken2 = false;  // second shake (photo → cherry)

        let baseBeta = null, baseGamma = null;
        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;
        let lastX = 0, lastY = 0;

        const LERP        = 0.12;
        const MAX_TILT_DEG = 30;
        const MAX_CARD_ROT = 20;
        const MAX_BG_SHIFT = 45;

        const colors = ['b-blue', 'b-red', 'b-pink', 'b-white', 'b-purple'];

        /* ── Balloon ───────────────────────────────────────── */
        function createBalloon() {
            const b = document.createElement('div');
            b.className = `balloon ${colors[Math.floor(Math.random() * colors.length)]}`;
            b.style.left = `${Math.random() * 90 + 5}%`;
            b.style.animationDuration = `${Math.random() * 4 + 4}s`;
            balloonContainer.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }

        /* ── Confetti ──────────────────────────────────────── */
        function startConfetti() {
            myConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ffffff', '#000080', '#fce029'] });
            confettiInterval = setInterval(() => {
                myConfetti({ particleCount: 5, angle: 60,  spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
                myConfetti({ particleCount: 5, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
            }, 200);
        }

        /* ── RAF tilt loop ─────────────────────────────────── */
        function tiltLoop() {
            if (!isShaken) {
                currentRotX += (targetRotX - currentRotX) * LERP;
                currentRotY += (targetRotY - currentRotY) * LERP;
                card.style.transform =
                    `scale(0.8) rotateX(${currentRotX.toFixed(3)}deg) rotateY(${currentRotY.toFixed(3)}deg)`;
                bg.style.transform =
                    `translate(${(-currentRotY / MAX_CARD_ROT * MAX_BG_SHIFT).toFixed(3)}px,` +
                    ` ${( currentRotX / MAX_CARD_ROT * MAX_BG_SHIFT).toFixed(3)}px)`;
            }
            rafId = requestAnimationFrame(tiltLoop);
        }

        /* ── Orientation ───────────────────────────────────── */
        function handleOrientation(event) {
            if (isShaken) return;
            const { beta, gamma } = event;
            if (beta === null || gamma === null) return;
            if (baseBeta === null || baseGamma === null) return;
            const dBeta  = Math.max(-MAX_TILT_DEG, Math.min(MAX_TILT_DEG, beta  - baseBeta));
            const dGamma = Math.max(-MAX_TILT_DEG, Math.min(MAX_TILT_DEG, gamma - baseGamma));
            targetRotX = -(dBeta  / MAX_TILT_DEG) * MAX_CARD_ROT;
            targetRotY =  (dGamma / MAX_TILT_DEG) * MAX_CARD_ROT;
        }

        /* ── Motion ────────────────────────────────────────── */
        function handleMotion(event) {
            const accel = event.accelerationIncludingGravity;
            if (!accel || accel.x === null) return;
            const deltaX = Math.abs(accel.x - lastX);
            const deltaY = Math.abs(accel.y - lastY);

            if (!isShaken) {
                // First shake: card → photo page
                if (deltaX > 25 || deltaY > 25) triggerSurprise();
            } else if (!isShaken2) {
                // Second shake: photo page → cherry blossom
                if (deltaX > 25 || deltaY > 25) triggerCherry();
            }

            lastX = accel.x;
            lastY = accel.y;
        }

        /* ── First shake: surprise reveal ──────────────────── */
        function triggerSurprise() {
            if (isShaken) return;
            isShaken = true;
            cancelAnimationFrame(rafId);
            clearInterval(confettiInterval);
            clearInterval(balloonInterval);
            card.classList.add('fade-out');
            setTimeout(() => {
                card.style.display = 'none';
                balloonContainer.style.display = 'none';
                bg.style.transform = 'translate(0,0)';
                shakeContent.style.display = 'flex';
            }, 500);
        }

        /* ── Second shake: cherry blossom ──────────────────── */
        function triggerCherry() {
            if (isShaken2) return;
            isShaken2 = true;

            // Fade out the photo page
            shakeContent.style.transition = 'opacity 0.6s ease-in-out';
            shakeContent.style.opacity = '0';

            setTimeout(() => {
                shakeContent.style.display = 'none';

                // Show and fade in cherry page
                cherryPage.style.display = 'block';
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        cherryPage.classList.add('visible');
                    });
                });

                // Boot the animation
                initCherryBranch();
            }, 600);
        }

        /* ── Cherry Branch Animation (ludwan/cherryBranch) ─── */
        function initCherryBranch() {
            var leavesStage, branchStage;
            var branchColor     = "#3A2311";
            var BackgroundColor = "#AEDDCD";
            var leafColorDark   = "#FFB7C5";
            var leafColorLight  = "#FFC5D0";
            var pistileColor    = "#6F0011";
            var numOfLeaves     = 400;
            var numOfFlowers    = 40;

            function initStages() {
                leavesStage = new createjs.Stage("leavesCanvas");
                leavesStage.canvas.width  = window.innerWidth;
                leavesStage.canvas.height = window.innerHeight - 10;

                branchStage = new createjs.Stage("treeCanvas");
                branchStage.canvas.width  = 1200;
                branchStage.canvas.height = 600;
            }

            function initBranch() {
                branchStage.addChild(drawBranch());
                branchStage.update();
            }

            function initFlowers() {
                for (var j = 0; j < numOfFlowers; j++) {
                    var flower = new createjs.Container();
                    for (var i = 0; i < 5; i++) {
                        var petalW = randomInt(14, 16);
                        var petalH = randomInt(14, 16);
                        var petal  = new createjs.Shape();
                        petal.regX = 0;
                        petal.regY = petalH;
                        petal.rotation = 72 * i;
                        petal.graphics.beginLinearGradientFill([leafColorDark, leafColorLight], [0.5, 0.5], 0, 0, petalW, petalH)
                            .drawRoundRectComplex(0, 0, petalW, petalH, 12, 1, 12, 1);
                        petal.cache(0, 0, 16, 16);
                        flower.addChild(petal);
                    }
                    var pistile  = new createjs.Shape();
                    var pistileH = randomInt(6, 8);
                    var pistileW = randomInt(6, 8);
                    var xPos     = Math.random() * 1000 + 100 | 0;
                    var yPos     = Math.random() * 300  + 200 | 0;
                    pistile.graphics.beginFill(pistileColor).drawEllipse(-pistileW / 2, -pistileH / 2, pistileW, pistileH);
                    flower.addChild(pistile);
                    flower.cache(-25, -25, 50, 50);
                    flower.x = xPos;
                    flower.y = yPos;
                    branchStage.addChild(flower);
                }
                createjs.Ticker.addEventListener("tick", branchStage);
            }

            function initLeaves() {
                for (var i = 0; i < numOfLeaves; i++) {
                    var leaf = new createjs.Shape();
                    var x    = (2 * window.innerWidth) * Math.random() + 300;
                    var y    = -((Math.random() * 20) + 15);
                    var falltime = Math.round(window.innerHeight * 7) + Math.random() * 5000;
                    leaf.graphics.beginFill(leafColorDark)
                        .drawRoundRectComplex(0, 0, randomInt(12, 16), randomInt(12, 16), 12, 1, 12, 1);
                    leaf.x = x;
                    leaf.y = y;
                    leavesStage.addChild(leaf);
                    createjs.Tween.get(leaf, { loop: true })
                        .wait(Math.random() * 10000)
                        .to({
                            x: -window.innerWidth,
                            y: 2 * window.innerHeight,
                            rotation: Math.random() * 360 + 60
                        }, Math.round(window.innerHeight * 11) + Math.random() * 5000);
                }
                createjs.Ticker.addEventListener("tick", leavesStage);
            }

            function drawBranch() {
                var branch = new createjs.Shape();
                branch.graphics.beginFill(branchColor);
                branch.graphics.moveTo(1200,456).lineTo(1149,461).lineTo(1040,506).lineTo(985,516).lineTo(933,539).lineTo(913,546).lineTo(864,558).lineTo(826,519).lineTo(753,494).lineTo(813,504).lineTo(805,498);
                branch.graphics.bezierCurveTo(783,460,780,470,769,461);
                branch.graphics.lineTo(755,446).lineTo(720,461).lineTo(600,405).lineTo(546,395).lineTo(503,413).lineTo(530,383).lineTo(486,381).lineTo(439,385).lineTo(416,403).lineTo(421,473).lineTo(384,540).lineTo(360,557);
                branch.graphics.bezierCurveTo(391,525,415,470,412,471);
                branch.graphics.bezierCurveTo(420,456,410,419,399,406);
                branch.graphics.lineTo(374,422).lineTo(309,423).lineTo(297,428).lineTo(278,470).lineTo(246,508).lineTo(275,454).lineTo(281,431);
                branch.graphics.bezierCurveTo(242,433,203,468,190,510);
                branch.graphics.lineTo(126,553).lineTo(171,514).lineTo(222,433);
                branch.graphics.bezierCurveTo(248,430,288,421,308,408);
                branch.graphics.lineTo(333,411).lineTo(371,406).lineTo(434,366).lineTo(489,366).lineTo(444,310);
                branch.graphics.bezierCurveTo(415,260,369,249,339,269);
                branch.graphics.lineTo(285,311).lineTo(275,316).lineTo(320,268).lineTo(247,269).lineTo(208,251).lineTo(112,273).lineTo(203,242).lineTo(248,258).lineTo(306,257).lineTo(341,250);
                branch.graphics.bezierCurveTo(363,254,385,255,406,252);
                branch.graphics.lineTo(505,366).lineTo(613,398).lineTo(720,444).lineTo(743,433).lineTo(647,340).lineTo(532,262).lineTo(655,324).lineTo(726,398).lineTo(724,355).lineTo(742,411).lineTo(758,426).lineTo(845,383).lineTo(834,380).lineTo(745,317).lineTo(655,266).lineTo(597,211).lineTo(582,171).lineTo(587,120).lineTo(543,47).lineTo(599,117);
                branch.graphics.lineTo(597,179).lineTo(614,212).lineTo(654,252).lineTo(686,268).lineTo(681,226).lineTo(674,188).lineTo(694,222).lineTo(699,284).lineTo(762,307).lineTo(781,325);
                branch.graphics.bezierCurveTo(810,370,896,390,934,373);
                branch.graphics.bezierCurveTo(944,381,960,387,966,382);
                branch.graphics.lineTo(1015,382).lineTo(993,320).lineTo(986,285).lineTo(957,251).lineTo(997,278).lineTo(1016,230).lineTo(1020,260).lineTo(1000,295).lineTo(1008,332).lineTo(1031,376).lineTo(1061,381).lineTo(1090,406).lineTo(1109,416).lineTo(1125,430).lineTo(1174,408).lineTo(1200,411).lineTo(1200,456);
                branch.graphics.beginFill(BackgroundColor);
                branch.graphics.moveTo(1102,444).lineTo(993,502).lineTo(948,518).lineTo(885,538).lineTo(867,538).lineTo(842,517).lineTo(770,440).lineTo(841,403).lineTo(922,388);
                branch.graphics.bezierCurveTo(929,385,948,388,959,400);
                branch.graphics.bezierCurveTo(972,394,998,396,1014,400);
                branch.graphics.bezierCurveTo(1030,390,1048,392,1052,401);
                branch.graphics.lineTo(1102,444);
                branch.cache(0, 0, 1200, 600);
                return branch;
            }

            function randomInt(a, b) {
                return Math.floor(Math.random() * (b - a + 1) + a);
            }

            initStages();
            initBranch();
            initFlowers();
            initLeaves();
            createjs.Ticker.setFPS(40);
        }

        /* ── Button ────────────────────────────────────────── */
        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const oState = await DeviceOrientationEvent.requestPermission();
                    if (oState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    const mState = await DeviceMotionEvent.requestPermission();
                    if (mState === 'granted') window.addEventListener('devicemotion', handleMotion);
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
            }

            btn.style.display = 'none';
            card.style.display = 'flex';
            balloonContainer.style.display = 'block';

            setTimeout(() => {
                const calibrate = (e) => {
                    if (e.beta !== null && e.gamma !== null) {
                        baseBeta  = e.beta;
                        baseGamma = e.gamma;
                    }
                    window.removeEventListener('deviceorientation', calibrate);
                };
                window.addEventListener('deviceorientation', calibrate);
            }, 300);

            setTimeout(() => { card.style.opacity = '1'; }, 50);

            startConfetti();
            balloonInterval = setInterval(createBalloon, 600);
            tiltLoop();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La multi ani Ilinca!!!!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: all 0.3s ease;
        }

        body {
            background-color: #fce029;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1200px;
        }

        #bg-layer {
            position: absolute;
            top: -20%; left: -20%; right: -20%; bottom: -20%;
            background: radial-gradient(circle at center, #fce029 0%, #f0c400 100%);
            z-index: -3;
            will-change: transform;
        }

        #balloon-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            display: none;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            opacity: 1;
            animation: floatUp infinite linear;
        }

        .balloon::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%;
            width: 2px; height: 80px;
            background: #000;
        }

        .b-blue   { background: #004dff; border: 2px solid #0033aa; }
        .b-red    { background: #ff0000; border: 2px solid #aa0000; }
        .b-pink   { background: #ff69b4; border: 2px solid #cc5599; }
        .b-white  { background: #ffffff; border: 2px solid #cccccc; }
        .b-purple { background: #a020f0; border: 2px solid #7010b0; }

        @keyframes floatUp {
            0%   { transform: translate(0, 0) rotate(0deg); }
            50%  { transform: translate(20px, -60vh) rotate(5deg); }
            100% { transform: translate(-20px, -130vh) rotate(10deg); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            padding: 20px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.4);
            transition: opacity 0.5s ease-in-out;
            transform-style: preserve-3d;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            width: fit-content;
            will-change: transform;
        }

        .greeting {
            color: #000080;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;
            transform: translateZ(60px);
        }

        .card img {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            width: 300px;
            height: 300px;
            max-width: 75vw;
            max-height: 75vw;
            object-fit: cover;
            border: 5px solid #fce029;
            transform: translateZ(40px);
        }

        #shake-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 20;
            width: 90%;
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), glow 2s ease-in-out infinite alternate;
            backdrop-filter: blur(10px);
        }

        #shake-content.visible {
            opacity: 1;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(255,255,255,0.3); }
            to   { box-shadow: 0 0 40px rgba(255,255,255,0.7); }
        }

        .shake-text {
            color: #000080;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.4;
            padding: 0 10px;
            min-height: 62px;
        }

        .noi-img {
            width: 320px;
            max-width: 85vw;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 8px solid white;
        }

        .timer-wrap {
            margin-top: 16px;
            width: 100%;
            max-width: 340px;
            padding: 14px 16px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(0, 0, 128, 0.12);
            opacity: 0;
            transform: translateY(14px) scale(0.98);
            pointer-events: none;
        }

        .timer-wrap.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .timer-label {
            color: #000080;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .timer-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            flex-wrap: nowrap;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .timer-part {
            min-width: 2ch;
            text-align: center;
            color: #000080;
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        .timer-sep {
            color: rgba(0, 0, 128, 0.75);
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
            margin: 0 2px;
        }

        .timer-unit-inline {
            color: rgba(0, 0, 128, 0.8);
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            margin-right: 4px;
            transform: translateY(1px);
        }

        .timer-box {
            background: linear-gradient(180deg, rgba(252, 224, 41, 0.95), rgba(255, 255, 255, 0.92));
            border: 1px solid rgba(0, 0, 128, 0.1);
            border-radius: 16px;
            padding: 10px 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .timer-value {
            display: block;
            color: #000080;
            font-size: 20px;
            font-weight: 900;
            line-height: 1;
        }

        .timer-unit {
            display: block;
            color: rgba(0, 0, 128, 0.8);
            font-size: 11px;
            font-weight: 800;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        #permission-btn {
            padding: 20px 50px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 900;
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            letter-spacing: 1px;
        }

        #permission-btn:active {
            transform: scale(0.95);
        }

        .fade-out { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="balloon-container"></div>
    <canvas id="confetti-canvas"></canvas>

    <button id="permission-btn">Apasa-ma!!!</button>

    <div class="card" id="tilt-card">
        <h1 class="greeting">La multi ani Ilinca!!</h1>
        <img src="tenor.gif" alt="Minion Birthday">
    </div>

    <div id="shake-content">
        <p class="shake-text" data-text="La multi ani iubirea mea!! Te iubesc cel mai mult din tot universul ilinca!"></p>
        <img src="noi.jpg" class="noi-img" alt="Noi">
        <div class="timer-wrap" id="timer-wrap">
            <div class="timer-label">De la 22.08.2025, 20:00</div>
            <div class="timer-line" id="timer-line">
                <span class="timer-part" id="timer-years">00</span><span class="timer-unit-inline">y</span><span class="timer-sep">:</span><span class="timer-part" id="timer-months">00</span><span class="timer-unit-inline">m</span><span class="timer-sep">:</span><span class="timer-part" id="timer-weeks">00</span><span class="timer-unit-inline">w</span><span class="timer-sep">:</span><span class="timer-part" id="timer-days">00</span><span class="timer-unit-inline">d</span><span class="timer-sep">:</span><span class="timer-part" id="timer-hours">00</span><span class="timer-unit-inline">h</span><span class="timer-sep">:</span><span class="timer-part" id="timer-minutes">00</span><span class="timer-unit-inline">m</span><span class="timer-sep">:</span><span class="timer-part" id="timer-seconds">00</span><span class="timer-unit-inline">s</span>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto"></audio>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const myConfetti = confetti.create(canvas, { resize: true });
        const card = document.getElementById('tilt-card');
        const bg = document.getElementById('bg-layer');
        const btn = document.getElementById('permission-btn');
        const shakeContent = document.getElementById('shake-content');
        const balloonContainer = document.getElementById('balloon-container');
        const music = document.getElementById('bg-music');
        const shakeText = document.querySelector('.shake-text');
        const shakeTextValue = shakeText.dataset.text;
        const timerWrap = document.getElementById('timer-wrap');
        const timerYears = document.getElementById('timer-years');
        const timerMonths = document.getElementById('timer-months');
        const timerWeeks = document.getElementById('timer-weeks');
        const timerDays = document.getElementById('timer-days');
        const timerHours = document.getElementById('timer-hours');
        const timerMinutes = document.getElementById('timer-minutes');
        const timerSeconds = document.getElementById('timer-seconds');

        let confettiInterval, balloonInterval, rafId, timerInterval;
        let isShaken = false;

        let baseBeta = null, baseGamma = null;

        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;

        let lastX = 0, lastY = 0;

        const LERP = 0.12;

        const colors = ['b-blue', 'b-red', 'b-pink', 'b-white', 'b-purple'];
        const startTime = new Date('2025-08-22T20:00:00+03:00').getTime();

        function requestFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen().catch(() => {});
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            } else if (el.mozRequestFullScreen) {
                el.mozRequestFullScreen();
            } else if (el.msRequestFullscreen) {
                el.msRequestFullscreen();
            }
        }

        function startMusic() {
            music.src = 'song.mp3';
            music.volume = 0;
            music.play().catch(() => {
                document.addEventListener('touchstart', () => music.play(), { once: true });
                document.addEventListener('click', () => music.play(), { once: true });
            });
            let vol = 0;
            const fade = setInterval(() => {
                vol += 0.05;
                music.volume = Math.min(vol, 1);
                if (vol >= 1) clearInterval(fade);
            }, 100);
        }

        function createBalloon() {
            const b = document.createElement('div');
            b.className = `balloon ${colors[Math.floor(Math.random() * colors.length)]}`;
            b.style.left = `${Math.random() * 90 + 5}%`;
            b.style.animationDuration = `${Math.random() * 4 + 4}s`;
            balloonContainer.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }

        function startConfetti() {
            myConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ffffff', '#000080', '#fce029'] });
            confettiInterval = setInterval(() => {
                myConfetti({ particleCount: 5, angle: 60, spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
                myConfetti({ particleCount: 5, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ffffff', '#000080', '#fce029'] });
            }, 200);
        }

        function typeText(el, text, speed, done) {
            let i = 0;
            el.innerHTML = '';
            const interval = setInterval(() => {
                el.innerHTML += text[i++];
                if (i >= text.length) {
                    clearInterval(interval);
                    if (done) done();
                }
            }, speed);
        }

        function pad2(value) {
            return String(value).padStart(2, '0');
        }

        function updateTimer() {
            const start = new Date('2025-08-22T20:00:00+03:00');
            const now = new Date();
            let cursor = new Date(start.getTime());

            let years = now.getFullYear() - cursor.getFullYear();
            cursor.setFullYear(cursor.getFullYear() + years);
            if (cursor > now) {
                years--;
                cursor = new Date(start.getTime());
                cursor.setFullYear(cursor.getFullYear() + years);
            }

            let months = (now.getFullYear() - cursor.getFullYear()) * 12 + (now.getMonth() - cursor.getMonth());
            cursor.setMonth(cursor.getMonth() + months);
            if (cursor > now) {
                months--;
                cursor = new Date(start.getTime());
                cursor.setFullYear(cursor.getFullYear() + years);
                cursor.setMonth(cursor.getMonth() + months);
            }

            let diff = Math.max(0, now - cursor);
            let weeks = Math.floor(diff / (7 * 24 * 60 * 60 * 1000));
            diff -= weeks * 7 * 24 * 60 * 60 * 1000;
            let days = Math.floor(diff / (24 * 60 * 60 * 1000));
            diff -= days * 24 * 60 * 60 * 1000;
            let hours = Math.floor(diff / (60 * 60 * 1000));
            diff -= hours * 60 * 60 * 1000;
            let minutes = Math.floor(diff / (60 * 1000));
            diff -= minutes * 60 * 1000;
            let seconds = Math.floor(diff / 1000);

            timerYears.textContent = pad2(years);
            timerMonths.textContent = pad2(months);
            timerWeeks.textContent = pad2(weeks);
            timerDays.textContent = pad2(days);
            timerHours.textContent = pad2(hours);
            timerMinutes.textContent = pad2(minutes);
            timerSeconds.textContent = pad2(seconds);
        }

        function startTimer() {
            updateTimer();
            timerWrap.classList.add('visible');
            timerInterval = setInterval(updateTimer, 1000);
        }

        function tiltLoop() {
            if (!isShaken) {
                currentRotX += (targetRotX - currentRotX) * LERP;
                currentRotY += (targetRotY - currentRotY) * LERP;

                card.style.transform =
                    `scale(0.8) rotateX(${currentRotX.toFixed(3)}deg) rotateY(${currentRotY.toFixed(3)}deg)`;
            }
            rafId = requestAnimationFrame(tiltLoop);
        }

        function handleOrientation(event) {
            if (isShaken) return;
            const { beta, gamma } = event;
            if (beta === null || gamma === null) return;
            if (baseBeta === null || baseGamma === null) return;

            const dBeta = beta - baseBeta;
            const dGamma = gamma - baseGamma;

            targetRotX = dBeta;
            targetRotY = -dGamma;
            bg.style.transform = `translate(${dGamma * 2}px, ${dBeta * 2}px)`;
        }

        function handleMotion(event) {
            if (isShaken) return;
            const accel = event.accelerationIncludingGravity;
            if (!accel || accel.x === null) return;
            const deltaX = Math.abs(accel.x - lastX);
            const deltaY = Math.abs(accel.y - lastY);
            if (deltaX > 25 || deltaY > 25) triggerSurprise();
            lastX = accel.x;
            lastY = accel.y;
        }

        function triggerSurprise() {
            if (isShaken) return;
            isShaken = true;
            cancelAnimationFrame(rafId);
            clearInterval(confettiInterval);
            clearInterval(balloonInterval);
            card.classList.add('fade-out');
            setTimeout(() => {
                card.style.display = 'none';
                balloonContainer.style.display = 'none';
                bg.style.transform = 'translate(0,0)';
                shakeContent.style.display = 'flex';
                setTimeout(() => {
                    shakeContent.classList.add('visible');
                    typeText(shakeText, shakeTextValue, 20, startTimer);
                }, 40);
            }, 500);
        }

        document.addEventListener('click', function(e) {
            myConfetti({
                particleCount: 20,
                spread: 40,
                origin: {
                    x: e.clientX / window.innerWidth,
                    y: e.clientY / window.innerHeight
                }
            });
        });

        btn.addEventListener('click', async () => {
            requestFullscreen();
            startMusic();

            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const oState = await DeviceOrientationEvent.requestPermission();
                    if (oState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    const mState = await DeviceMotionEvent.requestPermission();
                    if (mState === 'granted') window.addEventListener('devicemotion', handleMotion);
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
            }

            btn.style.display = 'none';
            card.style.display = 'flex';
            balloonContainer.style.display = 'block';

            setTimeout(() => {
                const calibrate = (e) => {
                    if (e.beta !== null && e.gamma !== null) {
                        baseBeta = e.beta;
                        baseGamma = e.gamma;
                    }
                    window.removeEventListener('deviceorientation', calibrate);
                };
                window.addEventListener('deviceorientation', calibrate);
            }, 300);

            setTimeout(() => { card.style.opacity = '1'; }, 50);
            setTimeout(startConfetti, 300);
            setTimeout(() => balloonInterval = setInterval(createBalloon, 600), 800);
            setTimeout(() => { bg.style.transform = 'translate(0,0)'; }, 200);
            tiltLoop();
        });
    </script>
</body>
</html>
